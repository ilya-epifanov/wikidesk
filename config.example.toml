# HTTP bind address (default: 127.0.0.1:1238)
# bind_address = "127.0.0.1:1238"

# Each wiki is named by a lowercase slug. The name derives:
# - server wiki repo: ./wiki-<name>/ (must contain a wiki/ subdirectory)
# - HTTP base path: /<name>
# - client mirror path: ./wiki-<name>/
[[wikis]]
name = "rlhf"

# Runner type for executing the research agent (default: "generic")
# - "generic": Spawns agent_command, captures stdout as the result.
# - "stream-json": Parses Claude Code's --output-format=stream-json output.
# - "acp": Uses Agent Client Protocol (claude-agent-acp) for structured communication.
# runner = "generic"

# Command for spawning the research agent.
# The literal "$PROMPT" element is replaced with the rendered prompt.
# Executed directly (no shell) with wiki-<name>/ as the working directory.
#
# SECURITY WARNING: The research agent runs with full, unrestricted
# permissions on the host. Flags like --dangerously-skip-permissions
# (Claude Code) or equivalent settings grant arbitrary file and command
# access. You MUST wrap either the server itself or the agent_command
# inside a sandbox (Docker, Podman, bubblewrap, VM, or similar)
# to prevent the agent from accessing anything beyond the wiki repo.
#
# Generic (default):
agent_command = ["claude", "-p", "$PROMPT", "--dangerously-skip-permissions"]
#
# Stream JSON:
# runner = "stream-json"
# agent_command = ["claude", "-p", "$PROMPT", "--output-format", "stream-json", "--dangerously-skip-permissions"]
#
# ACP (requires claude-agent-acp):
# runner = "acp"
# agent_command = ["claude-agent-acp"]
# Note: For ACP, configure bypass permissions via wiki-<name>/.claude/settings.json:
#   { "permissions": { "defaultMode": "bypass" } }

# Instructions shown to MCP clients describing when to use this wiki.
# instructions = "Use this server whenever you have a question about RLHF."

# Description for the 'research' tool shown to MCP clients.
# research_tool_description = "Submit a question about RLHF. Returns a task_id to poll with get_result."

# How long to keep completed/failed task results before evicting (seconds, default: 7200)
# completed_task_ttl_secs = 7200

# Maximum time an agent command may run before being killed (seconds, default: 1800)
# agent_timeout_secs = 1800

# Path to the prompt template file, relative to this config file (must contain a {question} placeholder).
# Keep this outside wiki-<name>/wiki/ so the research agent cannot edit its own prompt.
prompt_template = "prompts/rlhf.md"

# Example prompts/rlhf.md:
# Research the following question using the wiki in this repository.
# Follow the workflows described in CLAUDE.md. After updating the wiki,
# provide a concise answer with [[wikilinks]] to relevant
# pages you created or updated. Respond with ONLY the answer.
# Question: {question}
